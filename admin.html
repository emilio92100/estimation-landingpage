<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Espace demandes · Emilio Immobilier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#111F35;--ink2:#3B4A5F;--muted:#69788B;--soft:#98A5B5;
    --line:#E8EDF4;--line2:#F0F4F9;--bg:#F5F8FC;--card:#fff;
    --blue:#2563C9;--blue2:#3E82F0;--bluesoft:#EAF2FF;
    --font:'Schibsted Grotesk',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --sh:0 1px 2px rgba(15,32,56,.04),0 8px 24px -16px rgba(15,32,56,.14);
    --sh2:0 30px 60px -30px rgba(15,32,56,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button,input,select,textarea{font-family:inherit}
  ::selection{background:#cfe0fb}

  /* ===== LOGIN ===== */
  .gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(1100px 560px at 50% -8%,#DCE9FF,#F5F8FC 60%)}
  .gcard{width:100%;max-width:400px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:40px 34px;box-shadow:var(--sh2);text-align:center}
  .gbadge{width:58px;height:58px;border-radius:17px;background:linear-gradient(150deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 16px 28px -12px rgba(37,99,201,.7)}
  .gbadge svg{width:28px;height:28px;stroke:#fff}
  .gcard h1{font-size:23px;font-weight:800;letter-spacing:-.02em}
  .gcard p{color:var(--muted);font-size:14px;margin:9px 0 26px;line-height:1.5}
  .gcard input{width:100%;padding:15px 16px;border:1.5px solid var(--line);border-radius:13px;font-size:15px;text-align:center;letter-spacing:.06em}
  .gcard input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,201,.13)}
  .gcard button{width:100%;margin-top:13px;padding:15px;border:none;border-radius:13px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;background:linear-gradient(90deg,var(--blue),var(--blue2));box-shadow:0 16px 30px -16px rgba(37,99,201,.7)}
  .gcard button:active{transform:translateY(1px)}
  .gerr{color:#D64545;font-size:13px;margin-top:14px;display:none;font-weight:600}

  /* ===== APP SHELL ===== */
  .app{display:grid;grid-template-columns:266px 1fr;min-height:100vh}

  /* Sidebar */
  .side{background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:22px 16px}
  .s-brand{display:flex;align-items:center;gap:12px;padding:6px 8px 20px;margin-bottom:8px;border-bottom:1px solid var(--line2)}
  .s-logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(150deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 8px 16px -8px rgba(37,99,201,.6)}
  .s-logo svg{width:21px;height:21px;stroke:#fff}
  .s-bt{font-size:15px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
  .s-bs{font-size:11.5px;color:var(--soft);font-weight:600}
  .s-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);padding:16px 10px 8px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav-i{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:11px;cursor:pointer;transition:background .15s;border:none;background:none;text-align:left;width:100%}
  .nav-i:hover{background:var(--line2)}
  .nav-i.on{background:var(--bluesoft)}
  .nav-i .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .nav-i .nl{font-size:14px;font-weight:600;color:var(--ink2);flex:1}
  .nav-i.on .nl{color:var(--blue);font-weight:700}
  .nav-i .nc{font-size:12px;font-weight:700;color:var(--soft);background:var(--line2);padding:1px 9px;border-radius:100px;min-width:24px;text-align:center}
  .nav-i.on .nc{background:#fff;color:var(--blue)}
  .s-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line2)}
  .s-out{display:flex;align-items:center;gap:10px;width:100%;padding:11px;border:none;background:none;border-radius:11px;cursor:pointer;color:var(--muted);font-weight:600;font-size:14px}
  .s-out:hover{background:var(--line2);color:var(--ink)}
  .s-out svg{width:17px;height:17px;stroke:currentColor}

  /* Main */
  .main{padding:26px 30px 60px;min-width:0}
  .m-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:24px}
  .m-title{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .m-sub{color:var(--muted);font-size:14px;margin-top:4px}
  .m-tools{display:flex;align-items:center;gap:10px}
  .search{position:relative}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--soft)}
  .search input{width:270px;max-width:52vw;padding:11px 14px 11px 40px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:#fff;box-shadow:var(--sh)}
  .search input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,201,.1)}
  .icbtn{width:42px;height:42px;border:1px solid var(--line);background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh);transition:all .15s}
  .icbtn:hover{border-color:var(--blue);color:var(--blue)}
  .icbtn svg{width:18px;height:18px;stroke:currentColor}
  .icbtn.spin svg{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--sh);position:relative;overflow:hidden}
  .stat .sv{font-size:32px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .stat .sl{font-size:13px;color:var(--muted);font-weight:600;margin-top:8px}
  .stat .si{position:absolute;top:18px;right:18px;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center}
  .stat .si svg{width:19px;height:19px}

  /* Leads */
  .leads{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .lead{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px 18px 16px;box-shadow:var(--sh);cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;position:relative}
  .lead:hover{transform:translateY(-3px);box-shadow:0 26px 46px -30px rgba(15,32,56,.4);border-color:#D5E0ED}
  .l-head{display:flex;align-items:center;gap:13px;margin-bottom:15px}
  .l-av{width:46px;height:46px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff}
  .l-id{min-width:0;flex:1}
  .l-name{font-size:16.5px;font-weight:800;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .l-sub{font-size:12.5px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .l-badge{font-size:11px;font-weight:700;padding:5px 10px;border-radius:100px;white-space:nowrap;flex:none}
  .l-info{display:flex;flex-direction:column;gap:8px;padding:14px 0;border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);margin-bottom:14px}
  .l-line{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink2);font-weight:500}
  .l-line svg{width:15px;height:15px;stroke:var(--soft);flex:none}
  .l-line span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .l-foot{display:flex;align-items:center;gap:9px}
  .l-call{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--bluesoft);color:var(--blue);font-weight:700;font-size:14px;padding:11px;border-radius:11px;transition:background .15s}
  .l-call:hover{background:#DBE9FD}
  .l-call svg{width:16px;height:16px;stroke:var(--blue)}
  .l-date{font-size:11.5px;color:var(--soft);font-weight:600;flex:none}

  .empty,.loading{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--soft)}
  .empty svg{width:52px;height:52px;stroke:#CBD7E5;margin-bottom:16px}
  .empty h3{font-size:18px;font-weight:700;color:var(--muted)}
  .empty p{font-size:14px;margin-top:6px}
  .loading{font-weight:600}

  /* ===== DRAWER ===== */
  .scrim{position:fixed;inset:0;background:rgba(15,25,45,.4);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .3s;z-index:60}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:440px;max-width:92vw;background:#fff;z-index:70;box-shadow:-30px 0 60px -30px rgba(15,32,56,.5);
    transform:translateX(105%);transition:transform .35s cubic-bezier(.4,0,.1,1);display:flex;flex-direction:column}
  .drawer.show{transform:none}
  .d-head{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
  .d-av{width:52px;height:52px;border-radius:15px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:21px;color:#fff}
  .d-hid{flex:1;min-width:0}
  .d-name{font-size:20px;font-weight:800;letter-spacing:-.02em}
  .d-when{font-size:12.5px;color:var(--soft);font-weight:600;margin-top:2px}
  .d-close{width:38px;height:38px;border:1px solid var(--line);background:#fff;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
  .d-close:hover{background:var(--line2)}
  .d-close svg{width:18px;height:18px;stroke:var(--ink2)}
  .d-body{flex:1;overflow-y:auto;padding:22px 24px}
  .d-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);margin:22px 0 12px}
  .d-sec:first-child{margin-top:0}
  .d-contact{display:grid;gap:10px}
  .d-cbtn{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:13px;background:var(--bg);border:1px solid var(--line);font-weight:600;font-size:14.5px;transition:all .15s}
  .d-cbtn:hover{border-color:var(--blue);background:var(--bluesoft)}
  .d-cbtn svg{width:18px;height:18px;stroke:var(--blue);flex:none}
  .d-cbtn.prim{background:var(--blue);border-color:var(--blue);color:#fff}
  .d-cbtn.prim svg{stroke:#fff}
  .d-cbtn.prim:hover{background:#1E56B4}
  .d-cbtn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .d-grid{display:grid;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .d-row{display:flex;gap:14px;padding:12px 15px;background:#fff}
  .d-k{font-size:12px;font-weight:700;color:var(--soft);flex:none;width:96px;padding-top:1px}
  .d-v{font-size:14px;color:var(--ink);font-weight:600;line-height:1.4}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11.5px;font-weight:600;color:var(--blue);background:var(--bluesoft);padding:3px 9px;border-radius:7px}
  .seg{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:7px}
  .seg button{padding:10px 6px;border:1.5px solid var(--line);background:#fff;border-radius:11px;font-weight:700;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s}
  .seg button:hover{border-color:#C9D6E6}
  .notes{width:100%;min-height:96px;border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-size:14px;resize:vertical;line-height:1.5}
  .notes:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,201,.1)}

  .notes-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:10px}
  .notes-state{font-size:12px;font-weight:600;color:var(--soft)}
  .notes-state.warn{color:#C2790C}
  .notes-state.ok{color:#12A85E}
  .notes-state.err{color:#C0392B}
  .notes-save{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:none;border-radius:11px;background:linear-gradient(90deg,var(--blue),var(--blue2));color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;box-shadow:0 12px 22px -12px rgba(37,99,201,.7);transition:opacity .15s,transform .1s}
  .notes-save:disabled{opacity:.4;cursor:default;box-shadow:none}
  .notes-save:not(:disabled):active{transform:translateY(1px)}
  .notes-save svg{width:15px;height:15px;stroke:currentColor}
  .notes-save.saving svg{animation:spin .8s linear infinite}
  .d-cbtn.wa{border-color:#25D366;color:#0B7A5E}
  .d-cbtn.wa svg{color:#25D366;stroke:none;fill:currentColor}
  .d-cbtn.wa:hover{background:#EAFBF2;border-color:#25D366}
  .d-del{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:26px;padding:13px;border:1.5px solid #F3D5D5;background:#fff;color:#C0392B;border-radius:13px;font-weight:700;font-size:13.5px;cursor:pointer;transition:all .15s}
  .d-del:hover{background:#FDF0F0;border-color:#E4A0A0}
  .d-del svg{width:16px;height:16px;stroke:currentColor}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;font-size:14px;font-weight:600;padding:13px 22px;border-radius:13px;box-shadow:0 20px 40px -16px rgba(15,32,56,.6);transition:all .3s;pointer-events:none;z-index:90}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:980px){.stats{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:column;border-right:none;border-bottom:1px solid var(--line);padding:16px}
    .s-lbl{display:none}.s-brand{border-bottom:none;padding-bottom:12px;margin-bottom:0}
    .nav{flex-direction:row;overflow-x:auto;gap:8px;padding-bottom:4px}
    .nav-i{flex:none;white-space:nowrap;padding:9px 13px;border:1px solid var(--line)}
    .nav-i .nl{flex:none}
    .s-foot{display:none}
    .main{padding:20px 16px 50px}
    .search input{width:100%}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="gate" id="gate">
  <div class="gcard">
    <div class="gbadge"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <h1>Espace demandes</h1>
    <p>Vos demandes d'estimation, présentées clairement.</p>
    <input type="password" id="pass" placeholder="Mot de passe" autocomplete="current-password" />
    <button id="enter">Entrer</button>
    <div class="gerr" id="gerr">Mot de passe incorrect.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">
  <aside class="side">
    <div class="s-brand">
      <div class="s-logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6"/></svg></div>
      <div><div class="s-bt">Emilio</div><div class="s-bs">Demandes d'estimation</div></div>
    </div>
    <div class="s-lbl">Statuts</div>
    <nav class="nav" id="nav"></nav>
    <div class="s-foot">
      <button class="s-out" id="logout"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Se déconnecter</button>
    </div>
  </aside>

  <main class="main">
    <div class="m-head">
      <div>
        <div class="m-title" id="mtitle">Toutes les demandes</div>
        <div class="m-sub" id="msub">—</div>
      </div>
      <div class="m-tools">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" placeholder="Rechercher…" />
        </div>
        <button class="icbtn" id="refresh" title="Actualiser"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M20.5 9A9 9 0 0 0 5.6 5.6L1 10m22 4l-4.6 4.4A9 9 0 0 1 3.5 15"/></svg></button>
      </div>
    </div>

    <div class="stats" id="stats"></div>
    <div class="leads" id="leads"><div class="loading" id="loading">Chargement des demandes…</div></div>
  </main>
</div>

<!-- DRAWER -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer"></aside>

<div class="toast" id="toast"></div>

<script>
  var FN_URL='https://hwiznahlbeisxkkskhfb.supabase.co/functions/v1/admin-leads';
  var KEY='sb_publishable_E7XtDqfGmZNsjY75Mtem3Q_ShSdww2T';

  var STATUSES=['Nouveau','À rappeler','Rappelé','RDV pris','Perdu'];
  var SM={
    'Nouveau':{c:'#2563C9',bg:'#E7F0FD'},
    'À rappeler':{c:'#C2790C',bg:'#FBEEDA'},
    'Rappelé':{c:'#0E8577',bg:'#D8F1ED'},
    'RDV pris':{c:'#12A85E',bg:'#D9F4E6'},
    'Perdu':{c:'#7A8798',bg:'#EEF1F5'}
  };
  var PW='',LEADS=[],FILTER='Nouveau',SEARCH='',CUR=null;

  function getPW(){try{return sessionStorage.getItem('emilio_pw')||'';}catch(e){return PW;}}
  function setPW(v){PW=v;try{sessionStorage.setItem('emilio_pw',v);}catch(e){}}
  function api(action,extra){return fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify(Object.assign({password:getPW(),action:action},extra||{}))}).then(function(r){if(r.status===401)throw new Error('unauth');return r.json();});}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function ago(iso){var d=new Date(iso),s=(Date.now()-d.getTime())/1000;if(s<60)return "à l'instant";if(s<3600)return 'il y a '+Math.floor(s/60)+' min';if(s<86400)return 'il y a '+Math.floor(s/3600)+' h';if(s<172800)return 'hier';var j=Math.floor(s/86400);if(j<7)return 'il y a '+j+' j';return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
  function fullDate(iso){return new Date(iso).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});}
  function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2200);}

  function tryLogin(){var v=document.getElementById('pass').value.trim();if(!v)return;setPW(v);document.getElementById('gerr').style.display='none';load(function(ok){if(ok){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='grid';}else{document.getElementById('gerr').style.display='block';setPW('');}});}
  document.getElementById('enter').addEventListener('click',tryLogin);
  document.getElementById('pass').addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin();});
  document.getElementById('logout').addEventListener('click',function(){setPW('');try{sessionStorage.removeItem('emilio_pw');}catch(e){}document.getElementById('app').style.display='none';document.getElementById('gate').style.display='flex';document.getElementById('pass').value='';});
  document.getElementById('refresh').addEventListener('click',function(){var b=this;b.classList.add('spin');load(function(){b.classList.remove('spin');toast('Liste actualisée');});});
  document.getElementById('search').addEventListener('input',function(){SEARCH=this.value.toLowerCase().trim();render();});
  document.getElementById('scrim').addEventListener('click',closeDrawer);

  function load(cb){api('list').then(function(d){if(d&&d.leads){LEADS=d.leads;render();cb&&cb(true);}else cb&&cb(false);}).catch(function(){cb&&cb(false);});}

  function counts(){var c={Tous:LEADS.length};STATUSES.forEach(function(s){c[s]=0;});LEADS.forEach(function(l){var s=l.status||'Nouveau';if(c[s]!=null)c[s]++;});return c;}
  function weekCount(){var wk=Date.now()-7*86400000;return LEADS.filter(function(l){return new Date(l.created_at).getTime()>=wk;}).length;}

  function renderNav(){
    var c=counts();var items=['Tous'].concat(STATUSES);
    document.getElementById('nav').innerHTML=items.map(function(f){
      var on=FILTER===f?' on':'';var dot=f==='Tous'?'#98A5B5':SM[f].c;
      return '<button class="nav-i'+on+'" data-f="'+f+'"><span class="dot" style="background:'+dot+'"></span><span class="nl">'+f+'</span><span class="nc">'+(c[f]||0)+'</span></button>';
    }).join('');
    Array.prototype.forEach.call(document.querySelectorAll('.nav-i'),function(b){b.addEventListener('click',function(){FILTER=b.dataset.f;render();});});
  }
  function renderStats(){
    var c=counts();
    var cards=[
      {v:LEADS.length,l:'Demandes au total',col:'#2563C9',ic:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>'},
      {v:c['Nouveau']+c['À rappeler'],l:'À traiter',col:'#C2790C',ic:'<circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/>'},
      {v:c['RDV pris'],l:'RDV pris',col:'#12A85E',ic:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4M9 15l2 2 4-4"/>'},
      {v:weekCount(),l:'Cette semaine',col:'#7A5AF8',ic:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>'}
    ];
    document.getElementById('stats').innerHTML=cards.map(function(k){return '<div class="stat"><div class="si" style="background:'+k.col+'18"><svg viewBox="0 0 24 24" fill="none" stroke="'+k.col+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+k.ic+'</svg></div><div class="sv">'+k.v+'</div><div class="sl">'+k.l+'</div></div>';}).join('');
  }
  function bienLine(l){return [l.type,l.surface&&l.surface+' m²',l.pieces&&l.pieces+' pièces',l.chambres&&l.chambres+' ch.'].filter(Boolean).join(' · ');}
  function sitLine(l){if(l.situation==='En étage')return l.etage?('Étage '+l.etage):'En étage';return l.situation||'';}
  function subLine(l){return [l.type,l.ville].filter(Boolean).join(' · ')||'Demande';}

  function card(l){
    var st=l.status||'Nouveau',m=SM[st]||SM.Nouveau;var ini=(l.prenom||'?').trim().charAt(0).toUpperCase();
    var tel=(l.telephone||'').replace(/\s/g,'');var adr=[l.code_postal,l.ville].filter(Boolean).join(' ');
    return '<div class="lead" data-id="'+l.id+'">'+
      '<div class="l-head"><span class="l-av" style="background:'+m.c+'">'+esc(ini)+'</span>'+
      '<div class="l-id"><div class="l-name">'+esc(l.prenom||'Sans nom')+'</div><div class="l-sub">'+esc(subLine(l))+'</div></div>'+
      '<span class="l-badge" style="color:'+m.c+';background:'+m.bg+'">'+st+'</span></div>'+
      '<div class="l-info">'+
        (bienLine(l)?'<div class="l-line"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V8l7-5 7 5v13"/></svg><span>'+esc(bienLine(l))+'</span></div>':'')+
        (adr?'<div class="l-line"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>'+esc(adr)+'</span></div>':'')+
        (l.delai?'<div class="l-line"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg><span>'+esc(l.delai)+'</span></div>':'')+
      '</div>'+
      '<div class="l-foot">'+(tel?'<a class="l-call" href="tel:'+esc(tel)+'" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg>Appeler</a>':'<span></span>')+
      '<span class="l-date">'+ago(l.created_at)+'</span></div></div>';
  }

  function render(){
    renderNav();renderStats();
    document.getElementById('mtitle').textContent=FILTER==='Tous'?'Toutes les demandes':FILTER;
    var list=LEADS.slice();
    if(FILTER!=='Tous')list=list.filter(function(l){return (l.status||'Nouveau')===FILTER;});
    if(SEARCH)list=list.filter(function(l){return [l.prenom,l.ville,l.telephone,l.email,l.adresse,l.type,l.code_postal].filter(Boolean).join(' ').toLowerCase().indexOf(SEARCH)>=0;});
    document.getElementById('msub').textContent=list.length+(list.length>1?' demandes':' demande');
    var box=document.getElementById('leads');
    if(!list.length){box.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 15h6M9 11h2"/></svg><h3>Aucune demande</h3><p>Les nouvelles demandes apparaîtront ici.</p></div>';return;}
    box.innerHTML=list.map(card).join('');
    Array.prototype.forEach.call(document.querySelectorAll('.lead'),function(el){el.addEventListener('click',function(){openDrawer(el.dataset.id);});});
  }

  function openDrawer(id){
    var l=LEADS.filter(function(x){return x.id===id;})[0];if(!l)return;CUR=l;
    var st=l.status||'Nouveau',m=SM[st]||SM.Nouveau;var ini=(l.prenom||'?').trim().charAt(0).toUpperCase();
    var tel=(l.telephone||'').replace(/\s/g,'');
    var tags=[];if(l.exterieur)tags.push(l.exterieur);if(l.annexes)tags.push(l.annexes);if(l.etat)tags.push(l.etat);
    function row(k,v){return v?'<div class="d-row"><span class="d-k">'+k+'</span><span class="d-v">'+v+'</span></div>':'';}
    var adr=[l.adresse,[l.code_postal,l.ville].filter(Boolean).join(' ')].filter(Boolean).join(', ');
    var seg=STATUSES.map(function(s){var sm=SM[s];var on=s===st;return '<button data-s="'+s+'" style="'+(on?'background:'+sm.bg+';border-color:'+sm.c+';color:'+sm.c:'')+'">'+s+'</button>';}).join('');
    document.getElementById('drawer').innerHTML=
      '<div class="d-head"><span class="d-av" style="background:'+m.c+'">'+esc(ini)+'</span>'+
        '<div class="d-hid"><div class="d-name">'+esc(l.prenom||'Sans nom')+'</div><div class="d-when">Reçu '+ago(l.created_at)+'</div></div>'+
        '<button class="d-close" id="dclose"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>'+
      '<div class="d-body">'+
        '<div class="d-sec">Contact</div><div class="d-contact">'+
          (tel?'<a class="d-cbtn prim" href="tel:'+esc(tel)+'"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg><span>'+esc(l.telephone)+'</span></a>':'')+
          (l.email?'<a class="d-cbtn" href="mailto:'+esc(l.email)+'"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg><span>'+esc(l.email)+'</span></a>':'')+
          (tel?'<a class="d-cbtn wa" href="https://wa.me/33'+esc(tel.replace(/^0/,''))+'?text='+encodeURIComponent('Bonjour '+(l.prenom||'')+', Alexandre d\'Emilio Immobilier. Vous avez demandé une estimation'+(l.ville?' pour votre bien à '+l.ville:'')+'. Quand seriez-vous disponible ?')+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.51 5.26l-.999 3.648 3.978-1.007zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.074-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg><span>Écrire sur WhatsApp</span></a>':'')+
        '</div>'+
        '<div class="d-sec">Le bien</div><div class="d-grid">'+
          row('Bien',esc(bienLine(l)))+row('Situation',esc(sitLine(l)))+
          (tags.length?row('Détails','<span class="tags">'+tags.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'</span>'):'')+
          row('Adresse',esc(adr))+row('Projet',esc(l.delai))+
        '</div>'+
        '<div class="d-sec">Statut</div><div class="seg" id="seg">'+seg+'</div>'+
        '<div class="d-sec">Notes</div><textarea class="notes" id="notes" placeholder="Ajouter une note (rappel, remarque…)">'+esc(l.notes)+'</textarea>'+
        '<div class="notes-bar"><span class="notes-state" id="nstate"></span><button class="notes-save" id="nsave" disabled><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>Enregistrer</button></div>'+
        '<div class="d-sec">Informations</div><div class="d-grid">'+row('Reçu le',esc(fullDate(l.created_at)))+row('Source',esc(l.source))+'</div>'+
        '<button class="d-del" id="ddel"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6"/></svg>Supprimer cette demande</button>'+
      '</div>';
    document.getElementById('drawer').classList.add('show');document.getElementById('scrim').classList.add('show');
    document.getElementById('dclose').addEventListener('click',closeDrawer);
    Array.prototype.forEach.call(document.querySelectorAll('#seg button'),function(b){b.addEventListener('click',function(){setStatus(CUR.id,b.dataset.s);openDrawer(CUR.id);});});
    var nt=document.getElementById('notes'),ns=document.getElementById('nsave'),nst=document.getElementById('nstate');
    function noteDirty(){return nt.value!==(CUR.notes||'');}
    function refreshNote(){var d=noteDirty();ns.disabled=!d;nst.textContent=d?'Modifications non enregistrées':'';nst.className='notes-state'+(d?' warn':'');}
    nt.addEventListener('input',refreshNote);
    ns.addEventListener('click',function(){
      var val=nt.value;ns.disabled=true;ns.classList.add('saving');nst.textContent='Enregistrement…';nst.className='notes-state';
      api('update',{id:CUR.id,notes:val}).then(function(){
        CUR.notes=val;var l2=LEADS.filter(function(x){return x.id===CUR.id;})[0];if(l2)l2.notes=val;
        ns.classList.remove('saving');nst.textContent='Note enregistrée';nst.className='notes-state ok';toast('Note enregistrée');
        setTimeout(function(){if(!noteDirty())nst.textContent='';},2500);
      }).catch(function(){ns.classList.remove('saving');ns.disabled=false;nst.textContent='Erreur, réessayez';nst.className='notes-state err';});
    });
    refreshNote();
    document.getElementById('ddel').addEventListener('click',function(){
      if(!confirm('Supprimer définitivement la demande de '+(CUR.prenom||'ce contact')+' ?'))return;
      var id=CUR.id;LEADS=LEADS.filter(function(x){return x.id!==id;});closeDrawer();render();
      api('delete',{id:id}).then(function(){toast('Demande supprimée');}).catch(function(){toast('Erreur');});
    });
  }
  function closeDrawer(){document.getElementById('drawer').classList.remove('show');document.getElementById('scrim').classList.remove('show');CUR=null;}

  function setStatus(id,status){var l=LEADS.filter(function(x){return x.id===id;})[0];if(l)l.status=status;render();api('update',{id:id,status:status}).then(function(){toast('Statut : '+status);}).catch(function(){toast('Erreur');});}

  if(getPW()){load(function(ok){if(ok){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='grid';}else{setPW('');try{sessionStorage.removeItem('emilio_pw');}catch(e){}}});}
</script>
</body>
</html>
